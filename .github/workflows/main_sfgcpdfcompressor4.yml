# Deploy to sfgcpdfcompressor4 (Container Image mode)
name: Build and deploy Docker image to Azure Function App - sfgcpdfcompressor4

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_NAME: 'sfgcpdfcompressor4'
  IMAGE_NAME: sfgcpdfcompressor

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker buildx build \
            --progress=plain \
            --provenance=false \
            --push \
            --tag ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest \
            . 2>&1

      - name: Trigger Azure redeploy via webhook
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/webhook_response.txt -w "%{http_code}" \
            -X POST \
            --user "${{ secrets.AZURE_WEBHOOK_USER }}:${{ secrets.AZURE_WEBHOOK_PASS }}" \
            "https://sfgcpdfcompressor4-d6exdsg0bxgngjcz.scm.canadacentral-01.azurewebsites.net/api/registry/webhook")
          echo "HTTP status: $HTTP_STATUS"
          cat /tmp/webhook_response.txt
