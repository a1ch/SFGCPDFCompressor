# Deploy to sfgcpdfcompressor4 (Container Image mode - Ghostscript pre-installed)
# Builds and pushes Docker image to ACR on every push to main.
# The function app pulls the latest image automatically via continuous deployment.
name: Build and deploy Docker image to Azure Function App - sfgcpdfcompressor4

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_NAME: 'sfgcpdfcompressor4'
  IMAGE_NAME: sfgcpdfcompressor

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
