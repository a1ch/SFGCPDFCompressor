# Deploy to sfgcpdfcompressor4 (Container Image mode)
name: Build and deploy Docker image to Azure Function App - sfgcpdfcompressor4

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_NAME: 'sfgcpdfcompressor4'
  IMAGE_NAME: sfgcpdfcompressor

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker buildx build \
            --no-cache \
            --progress=plain \
            --provenance=false \
            --push \
            --tag ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest \
            . 2>&1

      - name: Notify Azure to pull new image
        run: |
          echo "Firing ACR webhook to trigger Azure container refresh..."
          response=$(curl -s -o /tmp/webhook_response.txt -w "%{http_code}" \
            -X POST \
            "${{ secrets.ACR_WEBHOOK_URL }}")
          echo "HTTP status: $response"
          cat /tmp/webhook_response.txt
          if [ "$response" -ge 200 ] && [ "$response" -lt 300 ]; then
            echo "Webhook fired successfully - Azure will pull new image shortly"
          else
            echo "Webhook call failed with HTTP $response"
            exit 1
          fi
