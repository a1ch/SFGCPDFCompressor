# This workflow is disabled - sfgcpdfcompressor (Flex Consumption) is no longer used
# Active deployment is handled by main_sfgcpdfcompressor2.yml

name: Build and deploy Powershell project to Azure Function App - sfgcpdfcompressor (DISABLED)

on:
  workflow_dispatch: # Manual trigger only - disabled from auto-deploy

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: '.'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: 'Checkout GitHub Action'
        uses: actions/checkout@v4
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_66CCE62E2E9244FE82C117DE55A1B1E5 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_52A8CB1CD45C40E09F77A596F1CCEDDE }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_5DAA2B7BE12D452EB0D1C9531924AC10 }}

      - name: 'Run Azure Functions Action'
        uses: Azure/functions-action@v1
        with:
          app-name: 'sfgcpdfcompressor'
          slot-name: 'Production'
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
